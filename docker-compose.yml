version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: system-analyzer-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/analyzer.db
    volumes:
      - ./data:/app/data
    networks:
      - analyzer-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: system-analyzer-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000
    networks:
      - analyzer-network

networks:
  analyzer-network:
    driver: bridge
